[phases.setup]
nixPkgs = ["nodejs_18", "npm-9_x", "openssl"]

[phases.install]
cmds = ["npm ci --include=dev", "cd frontend && npm ci"]

[phases.build]
cmds = ["npm run build", "cd frontend && npm run build"]

[start]
cmd = "npm run start:prod"

# Make these environment variables available during build
[variables]
DATABASE_URL = "${{DATABASE_URL}}"
DIRECT_URL = "${{DIRECT_URL}}"
VITE_API_URL = "/api"
