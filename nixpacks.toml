[phases.setup]
nixPkgs = ["nodejs_18", "npm-9_x", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start:prod"

# Make these environment variables available during build
[variables]
DATABASE_URL = "${{DATABASE_URL}}"
DIRECT_URL = "${{DIRECT_URL}}"
