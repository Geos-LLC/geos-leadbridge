name: Code Guards

on:
  # Run the guard on every PR regardless of base branch. Stacked PRs
  # (e.g. PR-B1 targeting PR-A's branch) need the same coverage as
  # PRs targeting main directly. Push filter stays narrow because we
  # only need post-merge re-runs on the canonical branches.
  pull_request:
  push:
    branches: [staging, main]

jobs:
  lead-status-guard:
    name: Lead.status write guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lead-status-guard
        run: node scripts/check-lead-status-writes.js
