<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Translate (and other browser translators) mutate text nodes
         inside React-controlled DOM, which detaches React's fibers from
         the rendered text and causes setState updates to stop painting —
         loaders spin forever, modals don't close, etc. Disable auto-
         translation app-wide. Users who really want translation can
         still trigger the browser's native page translator. -->
    <meta name="google" content="notranslate" />
    <title>LeadBridge - Lead Management</title>

    <!-- Plus Jakarta Sans + Geist Mono (Leadbridge App Shell) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Base styles -->
    <style>
      body {
        font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #f4f6fa;
        color: #132044;
        letter-spacing: -0.005em;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .gradient-text {
        background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .nav-item-active {
        background: var(--lb-accent-tint, #e7efff);
        color: var(--lb-accent, #2563eb);
        font-weight: 700;
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }
      .sidebar-scroll::-webkit-scrollbar { width: 4px; }
      .sidebar-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA: Web App Manifest. start_url=/m so the installed icon opens
         straight into the mobile app shell; the desktop app remains
         reachable at every other route. Replaces the older site.webmanifest. -->
    <link rel="manifest" href="/mobile.webmanifest" />

    <!-- Meta tags -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="LeadBridge - Manage your leads, automate replies, follow up automatically." />

    <!-- PWA: iOS-specific install hints. Apple ignores most of the
         webmanifest fields so these meta tags are how we get a
         full-screen standalone experience after "Add to Home Screen". -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LeadBridge" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
